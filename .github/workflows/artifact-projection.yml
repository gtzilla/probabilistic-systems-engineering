name: Artifact Projection

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  build_toolchain_image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push toolchain image
        uses: docker/build-push-action@v6
        with:
          context: tools/artifact-projection/docker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/artifact-projection-toolchain:ubuntu24.04-pdf2htmlex0.18.8rc1-sf-pandoc3.9

  fixtures_no_deletions:
    needs: [build_toolchain_image]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run fixtures (deletions disabled) inside toolchain container
        env:
          ARTIFACT_PROJECTION_ALLOW_DELETIONS: "false"
        run: |
          docker run --rm             -e ARTIFACT_PROJECTION_ALLOW_DELETIONS="${{ env.ARTIFACT_PROJECTION_ALLOW_DELETIONS }}"             -v "${{ github.workspace }}:/repo"             -w /repo             ghcr.io/${{ github.repository_owner }}/artifact-projection-toolchain:ubuntu24.04-pdf2htmlex0.18.8rc1-sf-pandoc3.9             bash -lc 'python3 -m venv .venv && . .venv/bin/activate && python -m pip install --upgrade pip && pip install -e tools/artifact-projection && python -m artifact_projection.fixtures_cli'

  fixtures_with_deletions:
    needs: [build_toolchain_image]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run fixtures (deletions enabled) inside toolchain container
        env:
          ARTIFACT_PROJECTION_ALLOW_DELETIONS: "true"
        run: |
          docker run --rm             -e ARTIFACT_PROJECTION_ALLOW_DELETIONS="${{ env.ARTIFACT_PROJECTION_ALLOW_DELETIONS }}"             -v "${{ github.workspace }}:/repo"             -w /repo             ghcr.io/${{ github.repository_owner }}/artifact-projection-toolchain:ubuntu24.04-pdf2htmlex0.18.8rc1-sf-pandoc3.9             bash -lc 'python3 -m venv .venv && . .venv/bin/activate && python -m pip install --upgrade pip && pip install -e tools/artifact-projection && python -m artifact_projection.fixtures_cli --allow-deletions'

  project:
    needs: [fixtures_no_deletions]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run projection inside toolchain container
        env:
          ARTIFACT_PROJECTION_ALLOW_DELETIONS: "false"
        run: |
          docker run --rm             -e ARTIFACT_PROJECTION_ALLOW_DELETIONS="${{ env.ARTIFACT_PROJECTION_ALLOW_DELETIONS }}"             -v "${{ github.workspace }}:/repo"             -w /repo             ghcr.io/${{ github.repository_owner }}/artifact-projection-toolchain:ubuntu24.04-pdf2htmlex0.18.8rc1-sf-pandoc3.9             bash -lc 'python3 -m venv .venv && . .venv/bin/activate && python -m pip install --upgrade pip && pip install -e tools/artifact-projection && python -m artifact_projection --config tools/artifact-projection/artifact-projection.json'

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "artifact-projection-bot"
            git config user.email "artifact-projection-bot@users.noreply.github.com"
            git add markdown
            git commit -m "artifact-projection: converge"
            git push
          fi
