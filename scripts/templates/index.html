<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SITE_NAME}}</title>
  <style>
    :root {
      --text: #111;
      --muted: #666;
      --border: #e5e5e5;
      --link: #222;
      --bg: #fff;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 900px;
      padding: 3rem 1.25rem 4rem;
      box-sizing: border-box;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 {
      margin: 0 0 0.5rem;
      font-size: 2.1rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .archive-section {
      margin: 2.5rem 0;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .archive-section h2 {
      margin: 0 0 1rem;
      font-size: 1.15rem;
    }

    ul {
      margin: 0;
      padding-left: 1.25rem;
    }

    li {
      margin: 0.5rem 0;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>{{SITE_NAME}}</h1>
      <p>Archive listing for papers and contracts.</p>
    </header>

    <section class="archive-section">
      <h2>Papers</h2>
      <ul>
        {{PAPERS_LIST}}
      </ul>
    </section>

    <section class="archive-section">
      <h2>Contracts</h2>
      <ul>
        {{CONTRACTS_LIST}}
      </ul>
    </section>
  </main>
</body>
</html>
