<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SITE_NAME}}</title>
  <style>
    :root {
      --text: #111111;
      --muted: #6b7280;
      --border: #e5e7eb;
      --link: #111827;
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-soft: #fcfcfd;
      --shadow: 0 10px 28px rgba(17, 24, 39, 0.04);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-size: 18px;
      line-height: 1.65;
    }

    .page {
      width: 100%;
      max-width: 76rem;
      margin: 0 auto;
      padding: 2.75rem 1.25rem 4rem;
      box-sizing: border-box;
    }

    .hero {
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      margin: 0 0 0.55rem;
      font-size: clamp(2.15rem, 5vw, 3.35rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 48rem;
      color: var(--muted);
      font-size: 1.06rem;
      line-height: 1.55;
    }

    .hero-meta {
      margin-top: 0.9rem;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .hero-meta a {
      color: inherit;
    }

    .archive-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.35rem;
      align-items: start;
    }

    .archive-section {
      background: linear-gradient(180deg, var(--panel-soft) 0%, var(--panel) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.2rem 1.2rem 1rem;
      box-shadow: var(--shadow);
    }

    .archive-section h2 {
      margin: 0 0 1rem;
      font-size: 1.3rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .group-block + .group-block {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .group-block h3 {
      margin: 0 0 0.7rem;
      font-size: 0.96rem;
      line-height: 1.25;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .archive-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .archive-item {
      margin: 0;
      padding: 0.85rem 0;
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }

    .archive-item:first-child {
      border-top: 0;
      padding-top: 0.1rem;
    }

    .item-title {
      font-size: 1rem;
      line-height: 1.45;
    }

    .item-actions {
      margin-top: 0.32rem;
      font-size: 0.94rem;
      color: var(--muted);
    }

    .item-action {
      color: var(--link);
      text-decoration: none;
    }

    .item-action:hover {
      text-decoration: underline;
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.98rem;
    }

    @media (max-width: 900px) {
      .archive-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      body {
        font-size: 19px;
        line-height: 1.72;
      }

      .page {
        padding: 1.4rem 1rem 3rem;
      }

      .hero {
        margin-bottom: 1.35rem;
        padding-bottom: 0.95rem;
      }

      .hero h1 {
        font-size: clamp(2rem, 9vw, 2.8rem);
      }

      .hero p {
        font-size: 1rem;
      }

      .archive-section {
        padding: 1rem;
        border-radius: 18px;
      }

      .archive-item {
        padding: 0.95rem 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>{{SITE_NAME}}</h1>
      <p>{{HERO_TEXT}}</p>
      <div class="hero-meta">By {{AUTHOR_NAME}} · Primary archive: <a href="https://archive.gtzilla.com/">archive.gtzilla.com</a></div>
    </header>

    <div class="archive-grid">
      <section class="archive-section">
        <h2>Papers</h2>
        {{PAPERS_SECTIONS}}
      </section>

      <section class="archive-section">
        <h2>Contracts</h2>
        {{CONTRACTS_SECTIONS}}
      </section>
    </div>
  </main>
</body>
</html>
