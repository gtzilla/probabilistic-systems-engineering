<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <meta name="author" content="Gregory Tomlinson">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <script type="application/ld+json">{{STRUCTURED_DATA_JSON}}</script>
  {{EXPORTED_STYLES}}
  <style>
    :root {
      --pse-bg: #ffffff;
      --pse-text: #111111;
      --pse-muted: #6b7280;
      --pse-border: #dddddd;
      --pse-link: #1f2937;
      --pse-shell: 48rem;
      --pse-callout-border: #d1d5db;
      --pse-callout-bg: #fafafa;
    }

    html {
      margin: 0;
      padding: 0;
      background: var(--pse-bg);
      -webkit-text-size-adjust: 100%;
    }

    body,
    body.doc-content,
    body[class] {
      margin: 0 !important;
      padding: 0 !important;
      width: auto !important;
      max-width: none !important;
      min-width: 0 !important;
      background: var(--pse-bg);
      color: var(--pse-text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    .pse-topbar {
      border-bottom: 1px solid var(--pse-border);
      margin-bottom: 1.5rem;
      background: var(--pse-bg);
    }

    .pse-topbar-inner {
      max-width: calc(var(--pse-shell) + 6rem);
      margin: 0 auto;
      padding: 1rem 1rem 0.95rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }

    .pse-site-link {
      color: var(--pse-text);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .pse-site-link:hover,
    .pse-nav a:hover {
      text-decoration: underline;
    }

    .pse-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      font-size: 1rem;
    }

    .pse-nav a {
      color: #4b5563;
      text-decoration: none;
    }

    .pse-doc-shell {
      width: 100%;
      max-width: var(--pse-shell);
      margin: 0 auto;
      padding: 0 1.125rem 3rem;
      color: var(--pse-text);
    }

    .pse-doc-shell > * {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box;
    }

    .pse-doc-shell img {
      max-width: 100% !important;
      height: auto !important;
    }

    .pse-doc-shell p,
    .pse-doc-shell li,
    .pse-doc-shell blockquote {
      font-size: 1.14rem !important;
      line-height: 1.72 !important;
      color: var(--pse-text) !important;
    }

    .pse-doc-shell p {
      margin: 0 0 1.5rem !important;
    }

    .pse-doc-shell p.pse-lead-in {
      margin-bottom: 0.45rem !important;
    }

    .pse-doc-shell p.pse-compact {
      margin-bottom: 1.2rem !important;
    }

    .pse-doc-shell p span,
    .pse-doc-shell li span,
    .pse-doc-shell blockquote span {
      font-size: inherit !important;
      line-height: inherit !important;
    }

    .pse-doc-shell ul,
    .pse-doc-shell ol {
      margin-top: 0 !important;
      margin-bottom: 1.35rem !important;
      padding-left: 2.55rem !important;
      max-width: 100% !important;
    }

    .pse-doc-shell ul ul,
    .pse-doc-shell ul ol,
    .pse-doc-shell ol ul,
    .pse-doc-shell ol ol {
      margin-top: 0.45rem !important;
      margin-bottom: 0.7rem !important;
      padding-left: 2rem !important;
    }

    .pse-doc-shell li {
      width: auto !important;
      max-width: 100% !important;
      margin: 0.45rem 0 !important;
      padding-left: 0.25rem !important;
    }

    .pse-doc-shell li > p:last-child {
      margin-bottom: 0 !important;
    }

    .pse-doc-shell p.pse-callout {
      margin: 1.9rem 0 1.9rem !important;
      padding: 0.35rem 1rem 0.35rem 1.1rem !important;
      border-left: 3px solid var(--pse-callout-border);
      background: var(--pse-callout-bg);
      font-size: 1.16rem !important;
      line-height: 1.68 !important;
      max-width: 42rem !important;
    }

    .pse-doc-shell .title,
    .pse-doc-shell p.title {
      font-size: clamp(2.6rem, 7vw, 4.4rem) !important;
      line-height: 1.02 !important;
      letter-spacing: -0.03em !important;
      font-weight: 700 !important;
      margin: 0 0 0.85rem !important;
      color: var(--pse-text) !important;
    }

    .pse-doc-shell .subtitle,
    .pse-doc-shell p.subtitle {
      font-size: clamp(1.25rem, 4vw, 2rem) !important;
      line-height: 1.2 !important;
      color: var(--pse-muted) !important;
      margin: 0 0 1.35rem !important;
    }

    .pse-doc-shell h1,
    .pse-doc-shell h2,
    .pse-doc-shell h3,
    .pse-doc-shell h4,
    .pse-doc-shell h5,
    .pse-doc-shell h6 {
      color: var(--pse-text) !important;
      letter-spacing: -0.02em !important;
      line-height: 1.12 !important;
      margin: 2.6rem 0 1rem !important;
    }

    .pse-doc-shell h1 { font-size: clamp(2rem, 5vw, 3rem) !important; }
    .pse-doc-shell h2 { font-size: clamp(1.65rem, 4vw, 2.35rem) !important; }
    .pse-doc-shell h3 { font-size: clamp(1.35rem, 3vw, 1.75rem) !important; }

    .pse-doc-shell hr {
      margin: 2.5rem 0 !important;
      border: 0;
      border-top: 1px solid var(--pse-border);
    }

    .pse-footer {
      margin: 3rem auto 1.5rem;
      max-width: var(--pse-shell);
      padding: 0 1.125rem;
      color: var(--pse-muted);
      font-size: 0.95rem;
    }

    @media (max-width: 820px) {
      .pse-topbar-inner {
        display: block;
        padding-top: 0.9rem;
      }

      .pse-site-link {
        display: block;
        margin-bottom: 0.7rem;
      }

      .pse-nav {
        gap: 0.85rem;
      }

      .pse-doc-shell {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .pse-doc-shell p,
      .pse-doc-shell li,
      .pse-doc-shell blockquote {
        font-size: 1.22rem !important;
        line-height: 1.78 !important;
      }

      .pse-doc-shell ul,
      .pse-doc-shell ol {
        padding-left: 3rem !important;
      }

      .pse-doc-shell ul ul,
      .pse-doc-shell ul ol,
      .pse-doc-shell ol ul,
      .pse-doc-shell ol ol {
        padding-left: 2rem !important;
      }

      .pse-doc-shell li {
        padding-left: 0.15rem !important;
      }

      .pse-doc-shell p.pse-callout {
        padding: 0.3rem 0.9rem 0.3rem 1rem !important;
      }
    }
  </style>
</head>
<body>
  <header class="pse-topbar">
    <div class="pse-topbar-inner">
      <a class="pse-site-link" href="{{HOME_HREF}}">{{SITE_NAME}}</a>
      <nav class="pse-nav">
        <a href="{{HOME_HREF}}">Home</a>
        <a href="{{PDF_HREF}}">PDF</a>
      </nav>
    </div>
  </header>
  <main class="pse-doc-shell">
    {{DOCUMENT_BODY}}
  </main>
  <footer class="pse-footer">Authored by Gregory Tomlinson</footer>
</body>
</html>
