<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <meta name="author" content="Gregory Tomlinson">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{PAGE_DESCRIPTION}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:image" content="{{OG_IMAGE_URL}}">
  <meta property="og:image:alt" content="{{OG_IMAGE_ALT}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{PAGE_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE_URL}}">
  <link rel="icon" href="{{FAVICON_ICO_HREF}}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{FAVICON_32_HREF}}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{FAVICON_16_HREF}}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{APPLE_TOUCH_ICON_HREF}}">
  <script type="application/ld+json">{{STRUCTURED_DATA_JSON}}</script>
  {{EXPORTED_STYLES}}
  <style>
    :root {
      --pse-bg: #ffffff;
      --pse-text: #111111;
      --pse-muted: #6b7280;
      --pse-border: #dddddd;
      --pse-link: #1f2937;
      --pse-shell: 48rem;
      --pse-callout-border: #d1d5db;
      --pse-callout-bg: #fafafa;
    }

    html {
      margin: 0;
      padding: 0;
      background: var(--pse-bg);
      -webkit-text-size-adjust: 100%;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    body,
    body.doc-content,
    body[class] {
      margin: 0 !important;
      padding: 0 !important;
      width: auto !important;
      max-width: none !important;
      min-width: 0 !important;
      background: var(--pse-bg);
      color: var(--pse-text);
      overflow-x: hidden;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    .pse-topbar {
      border-bottom: 1px solid var(--pse-border);
      margin-bottom: 1.5rem;
      background: var(--pse-bg);
    }

    .pse-topbar-inner {
      max-width: calc(var(--pse-shell) + 6rem);
      margin: 0 auto;
      padding: 1rem 1rem 0.95rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }

    .pse-site-link {
      color: var(--pse-text);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .pse-site-link:hover,
    .pse-nav a:hover {
      text-decoration: underline;
    }

    .pse-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      font-size: 1rem;
    }

    .pse-nav a {
      color: #4b5563;
      text-decoration: none;
    }

    .pse-doc-shell {
      width: 100%;
      max-width: var(--pse-shell);
      margin: 0 auto;
      padding: 0 1.5rem 3.25rem;
      color: var(--pse-text);
    }

    .pse-doc-shell > * {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box;
    }

    .pse-doc-shell img,
    .pse-doc-shell svg,
    .pse-doc-shell iframe {
      max-width: 100% !important;
      height: auto !important;
    }

    .pse-doc-shell table,
    .pse-doc-shell pre {
      display: block;
      max-width: 100% !important;
      overflow-x: auto !important;
      -webkit-overflow-scrolling: touch;
    }


    .pse-collapsible-section {
      margin: 1.75rem 0 2rem;
      border: 1px solid var(--pse-border);
      border-radius: 0.9rem;
      background: #fafafa;
      overflow: hidden;
    }

    .pse-collapsible-summary {
      list-style: none;
      cursor: pointer;
      padding: 1rem 1.1rem 1.05rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .pse-collapsible-summary::-webkit-details-marker {
      display: none;
    }

    .pse-collapsible-title {
      display: block;
      font-family: "Manrope", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1.08rem;
      line-height: 1.35;
      font-weight: 700;
      color: var(--pse-text);
    }

    .pse-collapsible-preview {
      display: block;
      font-size: 0.97rem;
      line-height: 1.55;
      color: var(--pse-muted);
    }

    .pse-collapsible-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.95rem;
      line-height: 1.3;
      font-weight: 600;
      color: var(--pse-link);
    }

    .pse-collapsible-toggle::before {
      content: "see all";
    }

    .pse-collapsible-section[open] .pse-collapsible-toggle::before {
      content: "hide";
    }

    .pse-collapsible-body {
      padding: 0 1.1rem 1.15rem;
      border-top: 1px solid var(--pse-border);
      background: var(--pse-bg);
    }

    .pse-collapsible-body > :last-child {
      margin-bottom: 0 !important;
    }


    .pse-doc-shell h1,
    .pse-doc-shell h2,
    .pse-doc-shell h3,
    .pse-doc-shell h4,
    .pse-doc-shell h5,
    .pse-doc-shell h6,
    .pse-site-link,
    .pse-nav {
      font-family: "Manrope", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .pse-doc-shell p,
    .pse-doc-shell li,
    .pse-doc-shell blockquote,
    .pse-doc-shell h1,
    .pse-doc-shell h2,
    .pse-doc-shell h3,
    .pse-doc-shell h4,
    .pse-doc-shell h5,
    .pse-doc-shell h6 {
      overflow-wrap: anywhere;
    }

    .pse-doc-shell p,
    .pse-doc-shell li,
    .pse-doc-shell blockquote {
      font-size: 1.14rem !important;
      line-height: 1.74 !important;
      color: var(--pse-text) !important;
    }

    .pse-doc-shell p {
      margin: 0 0 1.5rem !important;
    }

    .pse-doc-shell p.pse-lead-in {
      margin-bottom: 0.45rem !important;
    }

    .pse-doc-shell p.pse-compact {
      margin-bottom: 1.2rem !important;
    }

    .pse-doc-shell p span,
    .pse-doc-shell li span,
    .pse-doc-shell blockquote span,
    .pse-doc-shell h1 span,
    .pse-doc-shell h2 span,
    .pse-doc-shell h3 span,
    .pse-doc-shell h4 span,
    .pse-doc-shell h5 span,
    .pse-doc-shell h6 span,
    .pse-doc-shell h1 a,
    .pse-doc-shell h2 a,
    .pse-doc-shell h3 a,
    .pse-doc-shell h4 a,
    .pse-doc-shell h5 a,
    .pse-doc-shell h6 a,
    .pse-doc-shell h1 a span,
    .pse-doc-shell h2 a span,
    .pse-doc-shell h3 a span,
    .pse-doc-shell h4 a span,
    .pse-doc-shell h5 a span,
    .pse-doc-shell h6 a span {
      font-size: inherit !important;
      line-height: inherit !important;
      letter-spacing: inherit !important;
      font-weight: inherit !important;
      color: inherit !important;
    }

    .pse-doc-shell ul,
    .pse-doc-shell ol {
      margin-top: 0 !important;
      margin-bottom: 1.35rem !important;
      padding-left: 2.55rem !important;
      max-width: 100% !important;
    }

    .pse-doc-shell ul ul,
    .pse-doc-shell ul ol,
    .pse-doc-shell ol ul,
    .pse-doc-shell ol ol {
      margin-top: 0.45rem !important;
      margin-bottom: 0.7rem !important;
      padding-left: 2rem !important;
    }

    .pse-doc-shell li {
      width: auto !important;
      max-width: 100% !important;
      margin: 0.45rem 0 !important;
      padding-left: 0.25rem !important;
    }

    .pse-doc-shell li > p:last-child {
      margin-bottom: 0 !important;
    }

    .pse-doc-shell p.pse-callout {
      margin: 0 0 1.5rem !important;
      padding: 0 !important;
      border-left: 0;
      background: transparent;
      font-size: 1.14rem !important;
      line-height: 1.74 !important;
      max-width: 100% !important;
    }

    .pse-doc-shell .title,
    .pse-doc-shell p.title {
      font-size: clamp(2.55rem, 6.2vw, 4.15rem) !important;
      line-height: 1.02 !important;
      letter-spacing: -0.03em !important;
      font-weight: 700 !important;
      margin: 0 0 0.85rem !important;
      color: var(--pse-text) !important;
    }

    .pse-doc-shell .subtitle,
    .pse-doc-shell p.subtitle {
      font-size: clamp(1.18rem, 3.2vw, 1.68rem) !important;
      line-height: 1.2 !important;
      color: var(--pse-muted) !important;
      margin: 0 0 1.35rem !important;
    }

    .pse-doc-shell h1,
    .pse-doc-shell h2,
    .pse-doc-shell h3,
    .pse-doc-shell h4,
    .pse-doc-shell h5,
    .pse-doc-shell h6 {
      color: var(--pse-text) !important;
      letter-spacing: -0.02em !important;
      line-height: 1.12 !important;
      margin: 2.6rem 0 1rem !important;
    }


    .pse-doc-shell > h2:first-child,
    .pse-doc-shell > h2:first-of-type,
    .pse-doc-shell > h2:first-child *,
    .pse-doc-shell > h2:first-of-type * {
      font-size: clamp(2.55rem, 6.2vw, 4.15rem) !important;
      line-height: 1.02 !important;
      letter-spacing: -0.03em !important;
      font-weight: 700 !important;
      color: var(--pse-text) !important;
    }

    .pse-doc-shell > h2:first-child,
    .pse-doc-shell > h2:first-of-type {
      margin: 0 0 0.85rem !important;
    }

    .pse-doc-shell > h2:first-child + p,
    .pse-doc-shell > h2:first-child + p *,
    .pse-doc-shell > h2:first-of-type + p,
    .pse-doc-shell > h2:first-of-type + p * {
      font-size: clamp(1.18rem, 3.2vw, 1.68rem) !important;
      line-height: 1.2 !important;
      color: var(--pse-muted) !important;
    }
    .pse-doc-shell h1 { font-size: clamp(2rem, 5vw, 3rem) !important; }
    .pse-doc-shell h2 { font-size: clamp(1.7rem, 4.2vw, 2.3rem) !important; }
    .pse-doc-shell h3 { font-size: clamp(1.45rem, 3.4vw, 1.9rem) !important; }
    .pse-doc-shell h4 { font-size: clamp(1.26rem, 2.8vw, 1.58rem) !important; }
    .pse-doc-shell h5 { font-size: clamp(1.1rem, 2.2vw, 1.3rem) !important; }
    .pse-doc-shell h6 { font-size: clamp(0.98rem, 1.8vw, 1.08rem) !important; letter-spacing: -0.01em !important; }

    .pse-doc-shell hr {
      margin: 2.5rem 0 !important;
      border: 0;
      border-top: 1px solid var(--pse-border);
    }

    .pse-discovery {
      margin: 2.25rem 0 0 !important;
      padding-top: 1.25rem;
      border-top: 1px solid var(--pse-border);
    }

    .pse-discovery h2 {
      margin: 0 0 0.8rem !important;
      font-size: 1.1rem !important;
      line-height: 1.2 !important;
      letter-spacing: -0.01em !important;
    }

    .pse-discovery-list {
      list-style: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .pse-discovery-list-ordered {
      list-style: decimal !important;
      padding-left: 1.55rem !important;
      margin-top: 0.8rem !important;
    }

    .pse-discovery-list-ordered .pse-discovery-item {
      padding: 0.82rem 0 !important;
    }

    .pse-discovery-item {
      margin: 0 !important;
      padding: 0.55rem 0 !important;
      border-top: 1px solid var(--pse-border);
      list-style: none !important;
    }

    .pse-discovery-item:first-child {
      border-top: 0;
      padding-top: 0 !important;
    }

    .pse-discovery-item a {
      color: var(--pse-link);
      text-decoration: none;
      font-weight: 500;
    }

    .pse-discovery-item a:hover {
      text-decoration: underline;
    }

    .pse-nav-label {
      display: block;
      margin: 0 0 0.24rem;
      color: var(--pse-muted);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .pse-doc-header {
      margin: 0 0 2rem;
    }

    .pse-doc-header .pse-lead-in {
      color: var(--pse-muted) !important;
      font-size: 0.98rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      margin-bottom: 0.55rem !important;
    }

    .pse-doc-header h1 {
      margin: 0 0 0.55rem !important;
    }

    .pse-discovery-collection .pse-compact {
      margin-bottom: 0.35rem !important;
      color: var(--pse-muted) !important;
    }

    .pse-discovery-kind {
      display: inline-block;
      margin-left: 0.5rem;
      color: var(--pse-muted);
      font-size: 0.92rem;
    }

    .pse-footer {
      margin: 3rem auto 1.5rem;
      max-width: var(--pse-shell);
      padding: 0 1.5rem;
      color: var(--pse-muted);
      font-size: 0.95rem;
    }

    .pse-footer-link {
      display: inline-block;
      margin-right: 1rem;
      color: var(--pse-link);
      text-decoration: none;
      font-weight: 500;
    }

    .pse-footer-link:hover {
      text-decoration: underline;
    }

    .pse-footer-date {
      display: inline-block;
      margin-right: 1rem;
    }

    @media (max-width: 820px) {
      .pse-topbar-inner {
        display: block;
        padding: 0.9rem 1.25rem 0.95rem;
      }

      .pse-site-link {
        display: block;
        margin-bottom: 0.7rem;
      }

      .pse-nav {
        gap: 0.85rem;
      }

      .pse-doc-shell {
        padding-left: 1.25rem;
        padding-right: 1.25rem;
      }

      .pse-doc-shell p,
      .pse-doc-shell li,
      .pse-doc-shell blockquote {
        font-size: 1.18rem !important;
        line-height: 1.8 !important;
      }

      .pse-doc-shell ul,
      .pse-doc-shell ol {
        padding-left: 2.8rem !important;
      }

      .pse-doc-shell ul ul,
      .pse-doc-shell ul ol,
      .pse-doc-shell ol ul,
      .pse-doc-shell ol ol {
        padding-left: 2rem !important;
      }

      .pse-doc-shell li {
        padding-left: 0.15rem !important;
      }

      .pse-doc-shell p.pse-callout {
        padding: 0.3rem 0.9rem 0.3rem 1rem !important;
      }
    }
  </style>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/reading-system.css">
  <link rel="stylesheet" href="/assets/css/surfaces.css">
</head>
<body class="pse-page">
  <header class="pse-topbar">
    <div class="pse-topbar-inner">
      <a class="pse-site-link" href="{{HOME_HREF}}">{{SITE_NAME}}</a>
      <nav class="pse-nav">
        <a href="{{HOME_HREF}}">Home</a>
        <a href="{{PDF_HREF}}">PDF</a>
      </nav>
    </div>
  </header>
  <main class="pse-doc-shell">
    {{DOCUMENT_BODY}}
  </main>
  <footer class="pse-footer">{{DOCUMENT_FOOTER_LINK}}{{DOCUMENT_PUBLICATION_HTML}}Authored by Gregory Tomlinson</footer>
</body>
</html>
