<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{PAGE_TITLE}}</title>
<style>
:root{--bg:#fcfcf9;--panel:#ffffff;--text:#171717;--muted:#6b7280;--border:#e6e3dc;--border-strong:#d8d2c6;--soft:#f5f2ea}
html{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;box-sizing:border-box;overflow-x:hidden}
body{margin:0;padding:0;overflow-x:hidden}
*,*::before,*::after{box-sizing:inherit}
main,section,div,nav{min-width:0}
.page{max-width:78rem;margin:0 auto;padding:2.6rem 1.5rem 4.5rem}
.top{display:flex;justify-content:space-between;gap:1.5rem;align-items:flex-start;margin-bottom:1.8rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.site-kicker{margin:0 0 .5rem;color:var(--muted);font-size:.82rem;line-height:1.3;letter-spacing:.08em;text-transform:uppercase}
.heading h1{margin:0 0 .4rem;font-size:clamp(2.15rem,5vw,3.6rem);line-height:1.02;letter-spacing:-.035em}
.credit{margin:0 0 .45rem;color:var(--muted);font-size:.88rem;line-height:1.35}
.intro{margin:0;color:#4b5563;max-width:46rem;font-size:1rem;line-height:1.6}
.top nav{display:flex;gap:1rem;flex-wrap:wrap;padding-top:.2rem}
.top a{text-decoration:none;color:#374151}.top a:hover{text-decoration:underline}
.archive-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1.25rem;align-items:start}.archive-grid-bottom{margin-top:1.25rem}
.archive-section{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:1.25rem 1.2rem 1.05rem;box-shadow:0 1px 0 rgba(17,17,17,.02)}
.archive-section h2{margin:0 0 .95rem;font-size:1.3rem;letter-spacing:-.02em}
.group-block + .group-block{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.group-block h3{margin:0 0 .75rem;font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.archive-list{list-style:none;margin:0;padding:0}
.archive-item{padding:.8rem 0;border-top:1px solid var(--border)} .archive-item:first-child{border-top:0;padding-top:0}
.item-title{font-size:1.02rem;line-height:1.48;overflow-wrap:anywhere}.item-title-link{text-decoration:none;color:var(--text)} .item-title-link:hover{text-decoration:underline}
.item-actions{margin-top:.28rem;font-size:.93rem;color:var(--muted)} .item-action{text-decoration:none;color:#374151}.item-action:hover{text-decoration:underline}
.item-description{margin-top:.36rem;color:#4b5563;font-size:.95rem;line-height:1.5;overflow-wrap:anywhere}
.item-badge,.item-version-note{display:inline-block;margin-left:.5rem;font-size:.78rem;color:var(--muted);vertical-align:middle}
.empty-state{color:var(--muted);font-size:.98rem}
@media (max-width:900px){.page{padding:2rem 1.25rem 3.75rem}.top{display:block}.top nav{margin-top:.9rem}.archive-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="page">
  <div class="top">
    <div class="heading">
      <p class="site-kicker">Probabilistic Systems Engineering</p>
      <h1>{{PAGE_HEADING}}</h1>
      <p class="credit">Gregory Tomlinson</p>
      <p class="intro">{{PAGE_INTRO}}</p>
    </div>
    <nav>
      <a href="{{HOME_HREF}}">Home</a>
      <a href="{{LATEST_HREF}}">Latest</a>
      <a href="{{ARCHIVE_HREF}}">Archive</a>
    </nav>
  </div>
  <div class="archive-grid">
    <section id="papers" class="archive-section"><h2>Papers</h2>{{PAPERS_SECTIONS}}</section>
    <section id="contracts" class="archive-section"><h2>Contracts</h2>{{CONTRACTS_SECTIONS}}</section>
  </div>
  <div class="archive-grid archive-grid-bottom">
    <section id="replication" class="archive-section"><h2>Replication</h2>{{REPLICATION_SECTIONS}}</section>
  </div>
</main>
</body>
</html>
