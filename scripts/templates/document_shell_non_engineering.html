<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <meta name="author" content="Gregory Tomlinson">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{PAGE_DESCRIPTION}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:image" content="{{OG_IMAGE_URL}}">
  <meta property="og:image:alt" content="{{OG_IMAGE_ALT}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{PAGE_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE_URL}}">
  <link rel="icon" href="{{FAVICON_ICO_HREF}}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{{FAVICON_32_HREF}}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{FAVICON_16_HREF}}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{APPLE_TOUCH_ICON_HREF}}">
  <script type="application/ld+json">{{STRUCTURED_DATA_JSON}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  {{EXPORTED_STYLES}}
  <style>
    :root {
      --nei-bg: #f5f2ee;
      --nei-surface: #fcfaf7;
      --nei-surface-strong: #f0ece6;
      --nei-text: #203449;
      --nei-muted: #586776;
      --nei-accent: #4fa3b7;
      --nei-accent-strong: #2d7f98;
      --nei-accent-soft: rgba(79, 163, 183, 0.12);
      --nei-border: rgba(32, 52, 73, 0.14);
      --nei-shadow: 0 18px 48px rgba(32, 52, 73, 0.08);
      --nei-shell: 60rem;
      --nei-heading-font: "Plus Jakarta Sans", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.nei-theme-design {
      --nei-accent: #64a7a3;
      --nei-accent-strong: #2d6f74;
      --nei-accent-soft: rgba(100, 167, 163, 0.14);
    }

    body.nei-theme-startup {
      --nei-accent: #b8825f;
      --nei-accent-strong: #7e5034;
      --nei-accent-soft: rgba(199, 124, 95, 0.15);
    }

    body.nei-theme-enterprise {
      --nei-accent: #7f89c0;
      --nei-accent-strong: #515c94;
      --nei-accent-soft: rgba(127, 137, 192, 0.15);
    }

    body.nei-theme-research {
      --nei-accent: #5f93c7;
      --nei-accent-strong: #2e5f96;
      --nei-accent-soft: rgba(95, 147, 199, 0.14);
    }

    html {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(79, 163, 183, 0.16), transparent 26rem),
        linear-gradient(180deg, #fbf8f4 0%, var(--nei-bg) 100%);
      color: var(--nei-text);
      -webkit-text-size-adjust: 100%;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      margin: 0 !important;
      padding: 0 !important;
      min-width: 0 !important;
      background: transparent;
      color: var(--nei-text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body.has-mobile-header {
      padding-top: var(--mobile-header-offset, 0px) !important;
    }

    .nei-topbar {
      padding: 1.1rem 1.25rem 0;
    }

    .nei-topbar-inner {
      max-width: var(--nei-shell);
      margin: 0 auto;
      padding: 0.8rem 1rem;
      border: 1px solid var(--nei-border);
      border-radius: 10px;
      background: rgba(252, 250, 247, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      box-shadow: 0 10px 30px rgba(32, 52, 73, 0.05);
    }

    .nei-site-link,
    .nei-nav a {
      text-decoration: none;
      color: var(--nei-text);
    }

    .nei-site-link {
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .nei-nav {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .nei-nav a {
      color: var(--nei-muted);
      font-size: 0.94rem;
      padding: 0.4rem 0.68rem;
      border-radius: 10px;
      transition: background-color 120ms ease, color 120ms ease;
    }

    .nei-nav a:hover {
      background: var(--nei-accent-soft);
      color: var(--nei-text);
    }


    .nei-doc-shell {
      max-width: var(--nei-shell);
      margin: 0 auto;
      padding: 1.6rem 1.5rem 3.5rem;
    }

    .nei-article {
      background: linear-gradient(180deg, rgba(252,250,247,0.94) 0%, rgba(252,250,247,0.98) 100%);
      border: 1px solid rgba(32, 52, 73, 0.1);
      border-radius: 24px;
      box-shadow: var(--nei-shadow);
      padding: clamp(1.5rem, 3vw, 2.5rem);
      overflow: hidden;
      position: relative;
    }

    .nei-article::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 0.45rem;
      background: linear-gradient(90deg, var(--nei-accent), rgba(79, 163, 183, 0.25));
    }

    .nei-article > * {
      max-width: 100% !important;
    }


    .pse-collapsible-section {
      margin: 1.75rem 0 2rem;
      border: 1px solid var(--nei-border);
      border-radius: 0.9rem;
      background: rgba(79, 163, 183, 0.08);
      overflow: hidden;
    }

    .pse-collapsible-summary {
      list-style: none;
      cursor: pointer;
      padding: 1rem 1.1rem 1.05rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .pse-collapsible-summary::-webkit-details-marker {
      display: none;
    }

    .pse-collapsible-title {
      display: block;
      font-family: var(--nei-heading-font);
      font-size: 1.08rem;
      line-height: 1.35;
      font-weight: 700;
      color: var(--nei-text);
    }

    .pse-collapsible-preview {
      display: block;
      font-size: 0.97rem;
      line-height: 1.55;
      color: var(--nei-muted);
    }

    .pse-collapsible-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.95rem;
      line-height: 1.3;
      font-weight: 600;
      color: var(--nei-link);
    }

    .pse-collapsible-toggle::before {
      content: "see all";
    }

    .pse-collapsible-section[open] .pse-collapsible-toggle::before {
      content: "hide";
    }

    .pse-collapsible-body {
      padding: 0 1.1rem 1.15rem;
      border-top: 1px solid var(--nei-border);
      background: var(--nei-bg);
    }

    .pse-collapsible-body > :last-child {
      margin-bottom: 0 !important;
    }

    .nei-article p,
    .nei-article li,
    .nei-article blockquote {
      font-size: 1.12rem !important;
      line-height: 1.78 !important;
      color: var(--nei-text) !important;
      overflow-wrap: anywhere;
    }

    .nei-article p {
      margin: 0 0 1.35rem !important;
    }

    .nei-article h1,
    .nei-article h2,
    .nei-article h3,
    .nei-article h4,
    .nei-article h5,
    .nei-article h6 {
      margin: 2.2rem 0 0.85rem !important;
      line-height: 1.08 !important;
      letter-spacing: -0.03em !important;
      color: var(--nei-text) !important;
      overflow-wrap: anywhere;
      font-family: var(--nei-heading-font) !important;
      font-weight: 750 !important;
    }

    .nei-article h1 *,
    .nei-article h2 *,
    .nei-article h3 *,
    .nei-article h4 *,
    .nei-article h5 *,
    .nei-article h6 *,
    .nei-article th *,
    .nei-article td *,
    .nei-article p > span,
    .nei-article li > span {
      color: inherit !important;
      font: inherit !important;
      letter-spacing: inherit !important;
      line-height: inherit !important;
      text-decoration: inherit !important;
      background: transparent !important;
      vertical-align: baseline !important;
    }

    .nei-article > h2:first-child,
    .nei-article > h2:first-of-type {
      margin: 0 0 0.75rem !important;
      font-size: clamp(2.9rem, 6vw, 4.6rem) !important;
      line-height: 0.98 !important;
      max-width: 11ch;
    }

    .nei-article > h2:first-child + p,
    .nei-article > h2:first-of-type + p {
      font-size: clamp(1.25rem, 2.7vw, 1.6rem) !important;
      line-height: 1.35 !important;
      color: var(--nei-muted) !important;
      max-width: 44rem;
      margin-bottom: 1.35rem !important;
    }

    .nei-article > h2:first-child + p + p,
    .nei-article > h2:first-of-type + p + p {
      max-width: 32rem;
      color: var(--nei-muted) !important;
      font-size: 1rem !important;
      line-height: 1.65 !important;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid var(--nei-border);
      margin-bottom: 1.6rem !important;
    }

    .nei-article h2 {
      font-size: clamp(2.05rem, 4vw, 2.7rem) !important;
      padding-top: 0.7rem;
      border-top: 1px solid rgba(32, 52, 73, 0.1);
    }

    .nei-article h3 {
      font-size: clamp(1.45rem, 3vw, 1.86rem) !important;
      color: var(--nei-accent-strong) !important;
    }

    .nei-article h4,
    .nei-article h5,
    .nei-article h6 {
      font-size: 1.02rem !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase;
      color: var(--nei-muted) !important;
    }

    .nei-article a {
      color: var(--nei-accent-strong);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.12em;
    }

    .nei-article ul,
    .nei-article ol {
      margin: 0 0 1.35rem !important;
      padding-left: 1.4rem !important;
    }

    .nei-article li {
      margin: 0.45rem 0 !important;
      padding-left: 0.25rem !important;
    }

    .nei-article strong {
      color: var(--nei-text);
    }

    .nei-article .pse-kicker {
      color: var(--nei-muted) !important;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.9rem !important;
      margin-bottom: 0.8rem !important;
    }

    .nei-article .pse-hero-quote {
      margin: 1.35rem 0 1.5rem !important;
      padding: 1.25rem 1.3rem !important;
      background: linear-gradient(135deg, rgba(79, 163, 183, 0.18), rgba(79, 163, 183, 0.05));
      border: 1px solid rgba(79, 163, 183, 0.24);
      border-radius: 20px;
      color: var(--nei-accent-strong) !important;
      font-size: clamp(1.45rem, 3.2vw, 2rem) !important;
      line-height: 1.24 !important;
      font-weight: 700;
      letter-spacing: -0.02em;
      max-width: 30rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .nei-article .pse-scenario-label {
      display: inline-block;
      margin: 1.5rem 0 0.75rem !important;
      padding: 0.45rem 0.7rem !important;
      background: rgba(79, 163, 183, 0.1);
      border-radius: 999px;
      color: var(--nei-accent-strong) !important;
      font-size: 0.88rem !important;
      line-height: 1.25 !important;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
    }

    .nei-article .pse-table-wrap .pse-scenario-label {
      display: block;
      margin: 0 !important;
      padding: 0 !important;
      background: transparent;
      border-radius: 0;
      color: inherit !important;
      font-size: 1rem !important;
      line-height: 1.5 !important;
      text-transform: none;
      letter-spacing: inherit;
      font-weight: inherit;
    }

    .nei-article .pse-result {
      padding: 1rem 1.1rem !important;
      background: rgba(32, 52, 73, 0.045);
      border-left: 3px solid var(--nei-accent);
      border-radius: 0 16px 16px 0;
    }

    .nei-article .pse-table-wrap {
      margin: 1.7rem 0 2rem;
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid var(--nei-border);
      background: rgba(255,255,255,0.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .nei-article table {
      width: 100% !important;
      border-collapse: collapse !important;
      min-width: 34rem;
      margin: 0 !important;
    }

    .nei-article th,
    .nei-article td {
      padding: 0.95rem 1rem !important;
      text-align: left;
      border-bottom: 1px solid rgba(32, 52, 73, 0.08) !important;
      border-right: 0 !important;
      border-left: 0 !important;
      border-top: 0 !important;
      font-size: 1rem !important;
      line-height: 1.5 !important;
      background-clip: padding-box;
    }

    .nei-article th {
      font-size: 0.92rem !important;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--nei-muted);
      background: rgba(79, 163, 183, 0.07);
    }

    .nei-article tr:last-child td {
      border-bottom: 0;
    }

    .pse-discovery {
      margin-top: 2.5rem !important;
      padding: 1.15rem 1.2rem !important;
      border: 1px solid var(--nei-border);
      border-radius: 18px;
      background: rgba(255,255,255,0.52);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .pse-discovery-nav {
      margin: 2.2rem 0 0 !important;
      background: rgba(252, 250, 247, 0.9);
      border-color: rgba(32, 52, 73, 0.12);
    }

    .pse-discovery h2 {
      font-size: 1.1rem !important;
      margin: 0 0 0.75rem !important;
    }

    .pse-discovery-list,
    .pse-discovery-list-ordered {
      margin: 0 !important;
      padding-left: 1.35rem !important;
    }

    .pse-discovery-list {
      list-style: none !important;
      padding-left: 0 !important;
    }

    .pse-discovery-item {
      padding: 0.82rem 0 !important;
      border-top: 1px solid rgba(32, 52, 73, 0.08);
    }

    .pse-discovery-item a {
      font-weight: 600;
    }

    .pse-discovery-item:first-child {
      border-top: 0;
      padding-top: 0 !important;
    }

    .pse-discovery-kind {
      display: inline-block;
      margin-left: 0.45rem;
      color: var(--nei-accent-strong);
      font-size: 0.83rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }


    .pse-discovery.pse-discovery-collection .pse-discovery-list,
    .pse-discovery-nav .pse-discovery-list {
      display: grid;
      gap: 0.7rem;
    }

    .pse-discovery.pse-discovery-collection .pse-discovery-item,
    .pse-discovery:not(.pse-discovery-collection) .pse-discovery-item {
      margin: 0 !important;
      padding: 0.85rem 1rem !important;
      border: 1px solid rgba(32, 52, 73, 0.08);
      border-radius: 14px;
      background: rgba(252,250,247,0.8);
    }

    .pse-discovery-nav .pse-discovery-item-next {
      background: var(--nei-accent-soft);
      border-color: rgba(32, 52, 73, 0.05);
      order: -1;
    }

    .pse-discovery-nav .pse-discovery-item-next a {
      color: var(--nei-accent-strong);
    }

    .pse-discovery-nav .pse-nav-label {
      display: block;
      margin-bottom: 0.2rem;
      color: var(--nei-muted);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pse-discovery.pse-discovery-collection .pse-discovery-item:first-child,
    .pse-discovery:not(.pse-discovery-collection) .pse-discovery-item:first-child {
      padding-top: 0.85rem !important;
    }

    .nei-footer {
      max-width: var(--nei-shell);
      margin: 1rem auto 2rem;
      padding: 0 1.5rem;
      color: var(--nei-muted);
      font-size: 0.94rem;
    }

    @media (max-width: 820px) {
      .nei-topbar {
        padding-top: 0.75rem;
      }

      .nei-topbar-inner {
        display: block;
        border-radius: 16px;
      }

      .nei-site-link {
        display: block;
        margin-bottom: 0.65rem;
      }

      .nei-doc-shell {
        padding: 1rem 0.9rem 2.5rem;
      }

      .nei-article {
        border-radius: 24px;
        padding: 1.15rem;
      }

      .nei-article p,
      .nei-article li,
      .nei-article blockquote {
        font-size: 1.08rem !important;
        line-height: 1.76 !important;
      }

      .nei-article > h2:first-child,
      .nei-article > h2:first-of-type {
        max-width: none;
      }

      .nei-article > h2:first-child + p,
      .nei-article > h2:first-of-type + p,
      .nei-article > h2:first-child + p + p,
      .nei-article > h2:first-of-type + p + p {
        max-width: none;
      }

      .nei-article .pse-hero-quote {
        max-width: none;
      }

      .nei-article table {
        min-width: 28rem;
      }
    }
  </style>
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/reading-system.css">
  <link rel="stylesheet" href="/assets/css/surfaces.css">
<script defer src="/assets/js/mobile-header.js"></script>
<script defer src="/assets/js/code-highlight.js"></script>
</head>
<body class="nei-page nei-theme-{{NON_ENGINEERING_THEME}} has-mobile-header">
  <header class="mobile-header" data-mobile-header>
    <div class="mobile-header-bar">
      <div class="mobile-header-title-wrap">
        <a class="mobile-header-title" href="{{HOME_HREF}}">{{SITE_NAME}}</a>
        <span class="mobile-header-section">{{DOCUMENT_SECTION_LABEL}}</span>
      </div>
      <button class="mobile-header-toggle" type="button" data-mobile-menu-toggle aria-expanded="false" aria-controls="mobile-site-menu">Menu</button>
    </div>
    <nav id="mobile-site-menu" class="mobile-header-menu" data-mobile-menu aria-hidden="true">
      <a href="{{LATEST_HREF}}">Latest</a>
      <a href="{{ARCHIVE_HREF}}">Archive</a>
      <a href="{{PDF_HREF}}">PDF</a>
    </nav>
  </header>
  <header class="nei-topbar">
    <div class="nei-topbar-inner">
      <a class="nei-site-link" href="{{HOME_HREF}}">{{SITE_NAME}}</a>
      <nav class="nei-nav">
        <a href="{{LATEST_HREF}}">Latest</a>
        <a href="{{ARCHIVE_HREF}}">Archive</a>
        <a href="{{PDF_HREF}}">View PDF</a>
      </nav>
    </div>
  </header>
  <main class="nei-doc-shell">
    <article class="nei-article">
      {{DOCUMENT_BODY}}
    </article>
  </main>
  <footer class="nei-footer">Authored by Gregory Tomlinson</footer>
</body>
</html>
